name: Deploy Ciber Link Anime
on:
  push:
    branches: ["main"]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 🛡️ El escudo de Edmundo
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - uses: actions/deploy-pages@v4
